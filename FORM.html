<head>

        <body>
		<fieldset>
		<legend>personal details</legend>
            <form action="#" method="post">
                <h2></h2>
                <!--1. Student name-->
                <label for="StudentName">Student Name:</label>
                <input type="text" id="StudentName" name="StudentName" required>

                <!--Email-->
                <label for="email">email:</label>
                <input type="text" id="email" name="email"required>
                   

                   <!--date of birth-->
                  <label for="date of birth"> Date of birth:</label>
				  <input type="text" id="date of birth" name="date of birth" required>
              </fieldset> 
			  

<fieldset>
<legend>Gender</legend>

<input type="radio" id="male" name="gender" value="male" required>	
<label for="male">male</label>	
<input type="radio" id="female" name="gender" value="female" required>	
<label for="male">female</label>
<input type="radio" id="other" name="gender" value="other" required>	
<label for="other">other</label>
	 
</fieldset>
<fieldset>
<legend>academic information</legend>
<label for="courses">courses:</label>
<select id="course" name="course" reduired>
<option value="">Select courses</option>
<option value="computer science">computer science</option>
<option value="ICT">information & communication technology </option>
<option value="plumbing">plumbing</option>
<option value="machine woodwork">machine woodwork</option>
</select>
</fieldset>

<fieldset>
<legend>different sports</legend>
<div class="checkboxe-group">
<input type="checkbox" id="football" name="sports" value="football">
<label for="football">football</label>
<input type="checkbox" id="netball" name="sports" value="netball">
<label for="netball">netball</label>
<input type="checkbox" id="volleyball" name="sports" value="volleyball">
<label for="volleyball">volleyball</label>
<input type="checkbox" id="basketball" name="sports" value="basketball">
<label for="basketball">basketball</label>
<input type="checkbox" id="tennis" name="sports" value="tennis">
<label for="tennis">tennis</label>
</div>
</fieldset>

<fieldset>
<legend>additional information</legend>
<label for="comments">comments</label>
<textarea id="comments" name="comments"  row="4" placeholder="enter your comments here..."></textarea>
</fieldset>

<div class="buttons">
<input type="submit" value="submit">
<input type="reset" value="reset">
 </div>
        </form>    
        </body>
